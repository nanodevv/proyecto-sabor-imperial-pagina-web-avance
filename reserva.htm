<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Mesa - Sabor Imperial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<header>
    <nav class="navbar">
        <a href="index.htm">
            <div class="logo">Sabor Imperial</div>
        </a>
    </nav>
</header>

<div class="login-wrapper">

    <div class="login-left">
        <img src="imagenes/logo.png" alt="Logo">
    </div>

    <div class="login-container">
        <div class="login-box">
            <h2>Reservar Mesa</h2>

            <form method="POST">
                <label>Nombre completo</label>
                <input type="text" placeholder="Ingrese su nombre completo" required>

                <label>Fecha</label>
                <input type="date" required>

                <label>Hora</label>
                <input type="time" required>

                <label>Número de personas</label>
                <input type="number" placeholder="¿Cuántas personas?" min="1" max="20" required>

                <button type="submit">Reservar Mesa</button>
            </form>

            <p>¿Prefieres llamarnos? 📞 +51 918 468 527</p>
        </div>
    </div>

</div>

</body>
</html>
