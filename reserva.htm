<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Mesa - Sabor Imperial</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<header>
    <nav class="navbar">
        <div class="logo">Sabor Imperial</div>

        <div class="nav-right">
            <ul class="nav-center">
                <li><a href="index.htm">Inicio</a></li>
                <li><a href="nosotros.htm">Nosotros</a></li>
                <li><a href="platillos.htm">Platillos</a></li>
                <li><a href="reserva.htm">Reservas</a></li>
                <li><a href="#" class="btn-whatsapp">Delivery</a></li>
            </ul>
        </div>
    </nav>
</header>

<div class="login-wrapper">

    <div class="login-left">
        <img src="imagenes/logo.png" alt="Logo">
    </div>

    <div class="login-container">
        <div class="login-box">
            <h2>Reservar Mesa</h2>
            <p class="reserva-subtitle">Asegura tu lugar y disfruta de la mejor experiencia.</p>

            <form method="POST" class="reserva-form">
                <div class="input-group">
                    <label>Nombre completo</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Ingrese su nombre" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Fecha</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-calendar-days"></i>
                            <input type="date" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Hora</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-clock"></i>
                            <input type="time" required>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Número de personas</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user-group"></i>
                        <input type="number" placeholder="Ej. 4" min="1" max="20" required>
                    </div>
                </div>

                <button type="submit" class="btn-reserva">Confirmar Reserva <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <div class="reserva-contact">
                <p>¿Prefieres llamarnos?</p>
                <a href="tel:+51918468527" class="reserva-phone"><i class="fa-solid fa-phone"></i> +51 918 468 527</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
